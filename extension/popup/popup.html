<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>115 Cloud Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>115 Cloud</h1>
      <div id="status" class="status-badge offline">
        <span class="status-dot"></span>
        <span>Offline</span>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="magnets">Magnets</div>
      <div class="tab" data-tab="tasks">Downloads</div>
      <div class="tab" data-tab="files">Files</div>
    </div>

    <div id="magnets-tab" class="tab-content active">
      <div class="section">
        <div class="section-title">Detected Magnet Links</div>
        <div id="magnet-list" class="magnet-list">
          <div class="empty-state">
            <p>No magnet links detected</p>
          </div>
        </div>
      </div>
      <button id="send-all-btn" class="btn btn-primary btn-block" style="display:none">
        Send All to 115
      </button>
    </div>

    <div id="tasks-tab" class="tab-content">
      <div class="section">
        <div class="section-title">Download Tasks</div>
        <div id="task-list" class="task-list">
          <div class="loading">
            <div class="spinner"></div>
          </div>
        </div>
      </div>
      <button id="refresh-tasks-btn" class="btn btn-primary btn-block">
        Refresh Tasks
      </button>
    </div>

    <div id="files-tab" class="tab-content">
      <div id="breadcrumb" class="breadcrumb">
        <span class="breadcrumb-item" data-cid="0">Root</span>
      </div>
      <div id="file-list" class="file-list">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button id="new-folder-btn" class="btn btn-sm btn-primary">New Folder</button>
        <button id="refresh-files-btn" class="btn btn-sm btn-primary">Refresh</button>
      </div>
    </div>

    <div id="monitor-section" style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px">Auto Download Monitor</span>
        <label class="switch">
          <input type="checkbox" id="monitor-toggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
